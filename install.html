<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9fb;
            color: #15141a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 6px;
            border: 1px solid #cfcfd8;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        ol {
            padding-left: 20px;
            margin: 0;
        }
        li {
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
        code {
            background: #f0f0f4;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: monospace;
            border: 1px solid #d7d7db;
            display: block;
            margin-top: 5px;
            word-break: break-all;
            user-select: all; /* Makes selection easier */
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Configuration Required</h1>
        
        <ol>
            <li>
                Open a new tab and go to:
                <code>about:config</code>
            </li>
            <li>
                Search for the following preference:
                <code>browser.tabs.fadeOutUnloadedTabs</code>
            </li>
            <li>
                Double-click it to set it to:
                <code>true</code>
            </li>
        </ol>

        <div class="note">
            This will make unloaded tabs appear transparent/dimmed.
        </div>
    </div>
</body>
</html>
