<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #fdfaf5;
      --card: #ffffff;
      --text: #5d4037;
      --primary: #795548;
      --border: #d7ccc8;
      --accent: #81c784; /* Sage green for saved */
      --danger: #e57373; /* Red for errors */
      --switch-bg: #d7ccc8;
    }

    body.dark {
      --bg: #1b1614; /* Deep Espresso */
      --card: #261f1c;
      --text: #d7ccc8; /* Soft cream */
      --primary: #a1887f; /* Mocha accent */
      --border: #3e2723;
      --danger: #ef5350;
      --switch-bg: #3e2723;
    }

    body { 
      width: 250px; 
      font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
      transition: background 0.2s, color 0.2s; 
    }

    .container { padding: 15px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .brand { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      font-weight: 800; 
      color: var(--text); 
      font-size: 16px; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .brand-logo img { width: 48px; height: 48px; }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--switch-bg);
      transition: .4s;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .slider svg { width: 10px; height: 10px; fill: var(--text); opacity: 0.5; }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
      z-index: 2;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    .settings-group {
      display: flex;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 12px;
      align-items: center;
    }

    .limit-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-group input {
      width: 2ch;
      min-width: 2ch;
      max-width: 10ch;
      border: none;
      border-bottom: 1.5px solid var(--primary);
      border-right: 1px solid rgba(0,0,0,0.1);
      background: transparent;
      padding: 0 4px;
      color: var(--text);
      font-weight: 700;
      outline: none;
      text-align: center;
      transition: width 0.1s ease, color 0.2s, border-color 0.2s;
      -moz-appearance: textfield;
    }

    body.dark .settings-group input {
      border-right-color: rgba(255,255,255,0.1);
    }

    .settings-group input:focus {
      border-bottom-width: 2.5px;
      margin-bottom: -1px;
    }

    .settings-group input.invalid {
      color: var(--danger) !important;
      border-bottom-color: var(--danger) !important;
    }

    /* Hide arrows Chrome, Safari, Edge, Opera */
    .settings-group input::-webkit-outer-spin-button,
    .settings-group input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .settings-group select {
      border: none;
      background: transparent;
      color: var(--primary);
      font-weight: 700;
      outline: none;
      cursor: pointer;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-bottom: 15px;
      opacity: 0.8;
    }

    button#a { 
      width: 100%; 
      padding: 10px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: 700; 
      margin-bottom: 15px;
      transition: background 0.2s;
    }

    .stats { font-size: 11px; margin-bottom: 10px; opacity: 0.7; font-weight: 600; }

    .tab-list { 
      max-height: 150px; 
      overflow-y: auto; 
      padding-top: 5px;
    }

    .tab-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 6px 4px; 
      border-radius: 4px;
    }
    .tab-item:hover { background: rgba(0,0,0,0.03); }
    body.dark .tab-item:hover { background: rgba(255,255,255,0.05); }

    .tab-title { flex: 1; min-width: 0; font-size: 11px; display: flex; align-items: center; margin-right: 10px; }
    .tab-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    
    .timer { 
      font-size: 9px; 
      color: var(--primary); 
      margin-left: auto; 
      padding-left: 8px;
      font-weight: 800; 
      display: none; 
      white-space: nowrap;
    }
    .tab-item:hover .timer { display: inline; }

    .status-btn { 
      padding: 3px 8px; 
      border-radius: 3px; 
      font-size: 9px; 
      font-weight: 800; 
      cursor: pointer; 
      border: none; 
      background: var(--accent);
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="brand-logo">
          <img src="icon-dark.svg" alt="logo">
        </div>
        <span>Lite Noodle</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider">
          <svg viewBox="0 0 24 24"><path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M18.36,5.64c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L18.36,5.64z M7.05,18.36c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12.1,20.9c-4.9,0-8.9-4-8.9-8.9c0-4.9,4-8.9,8.9-8.9c0.4,0,0.8,0,1.1,0.1c0.4,0.1,0.6,0.4,0.6,0.8c-0.1,0.3-0.3,0.6-0.6,0.6c-0.2,0-0.3,0-0.5,0c-3.7,0-6.7,3-6.7,6.7c0,3.7,3,6.7,6.7,6.7c0.9,0,1.8-0.2,2.6-0.5c0.3-0.1,0.7,0,0.9,0.2c0.2,0.2,0.3,0.6,0.2,0.9c-0.1,0.3-0.3,0.5-0.5,0.6C14.1,20.7,13.1,20.9,12.1,20.9z"/></svg>
        </span>
      </label>
    </header>
    
    <div class="settings-group">
      <div class="limit-wrapper">
        <span>Limit:</span>
        <input id="d" type="text">
      </div>
      <select id="u">
        <option value="s">sec</option>
        <option value="m">min</option>
        <option value="h">hour</option>
      </select>
    </div>

    <div class="checkbox-row">
      <input id="p" type="checkbox">
      <label for="p">Also discard pinned tabs</label>
    </div>

    <div class="checkbox-row">
      <input id="discardNewTabs" type="checkbox">
      <label for="discardNewTabs">Discard New Tab pages</label>
    </div>

    <div class="checkbox-row" title="If checked, changing settings resets all timers. If unchecked, timers are only capped if you reduce the limit (keeps their current progress otherwise).">
      <input id="resetAll" type="checkbox">
      <label for="resetAll">Always reset timers on change</label>
    </div>

    <div class="stats">Loaded: <span id="s">...</span></div>

    <button id="a">Discard Others</button>

    <div class="tab-list" id="list"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
